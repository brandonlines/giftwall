name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npm test -- --ci

  # Detects whether Supabase secrets are configured (secrets can't be used
  # directly in a job-level `if`, so we surface a boolean via an output).
  config:
    name: Detect Supabase secrets
    runs-on: ubuntu-latest
    outputs:
      has_supabase: ${{ steps.check.outputs.has }}
    steps:
      - id: check
        run: echo "has=${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  rls:
    name: RLS / Surprise Wall suite
    needs: config
    if: needs.config.outputs.has_supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run RLS suite against the configured project
        run: npm run test:rls
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
